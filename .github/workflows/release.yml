name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BUILD=$(git rev-list --count HEAD)
          echo "TAG=$TAG"         >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD=$BUILD"     >> $GITHUB_OUTPUT

      - name: Bump version in pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.VERSION }}+${{ steps.version.outputs.BUILD }}/" pubspec.yaml

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release.keystore

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=BASE_URL=https://api.hookahorder.ru

      - name: Build AAB (release)
        run: |
          flutter build appbundle --release \
            --dart-define=BASE_URL=https://api.hookahorder.ru

      - name: Rename artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             "hookah-admin-${{ steps.version.outputs.TAG }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
             "hookah-admin-${{ steps.version.outputs.TAG }}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hookah Admin ${{ steps.version.outputs.TAG }}"
          generate_release_notes: true
          files: |
            hookah-admin-${{ steps.version.outputs.TAG }}.apk
            hookah-admin-${{ steps.version.outputs.TAG }}.aab
