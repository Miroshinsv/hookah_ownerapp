name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Общая подготовка: версия и changelog ──────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag:     ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
      build:   ${{ steps.v.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Извлечь версию из тега
        id: v
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG"                               >> $GITHUB_OUTPUT
          echo "version=${TAG#v}"                       >> $GITHUB_OUTPUT
          echo "build=$(git rev-list --count HEAD)"     >> $GITHUB_OUTPUT

      - name: Извлечь changelog для релиза
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          version = os.environ['VERSION']
          path    = 'CHANGELOG.md'
          body    = ''

          if os.path.exists(path):
              content = open(path).read()
              pat = rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
              m = re.search(pat, content, re.DOTALL)
              if m:
                  body = m.group(1).strip()

          with open('release_body.md', 'w') as f:
              f.write(body or f'Release {version}')
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: release_body.md
          retention-days: 1


  # ── 2. Android APK + AAB ─────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: setup
    env:
      JAVA_TOOL_OPTIONS: "-Xmx4g"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Устанавливает Android SDK + cmdline-tools + нужный NDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Gradle cache ускоряет повторные сборки
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Подставить версию в pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ needs.setup.outputs.version }}+${{ needs.setup.outputs.build }}/" pubspec.yaml

      - run: flutter pub get

      - name: Декодировать keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 --decode > android/app/release.keystore

      - name: Создать key.properties
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS:   ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:  ${{ secrets.KEY_ALIAS }}
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.keystore\n' \
            "$STORE_PASS" "$KEY_PASS" "$KEY_ALIAS" \
            > android/key.properties

      - name: Build APK (release)
        run: flutter build apk --release --dart-define=BASE_URL=https://api.hookahorder.ru --dart-define=APP_VERSION=${{ needs.setup.outputs.version }}

      - name: Build AAB (release)
        run: flutter build appbundle --release --dart-define=BASE_URL=https://api.hookahorder.ru --dart-define=APP_VERSION=${{ needs.setup.outputs.version }}

      - name: Собрать артефакты в плоскую папку
        run: |
          mkdir -p staging
          cp build/app/outputs/flutter-apk/app-release.apk staging/
          cp build/app/outputs/bundle/release/app-release.aab staging/

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: staging/
          retention-days: 1


  # ── 3. Windows .exe (zip) ────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Подставить версию в pubspec.yaml
        shell: bash
        run: |
          sed -i "s/^version: .*/version: ${{ needs.setup.outputs.version }}+${{ needs.setup.outputs.build }}/" pubspec.yaml

      - run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release --dart-define=BASE_URL=https://api.hookahorder.ru --dart-define=APP_VERSION=${{ needs.setup.outputs.version }}

      - name: Упаковать в zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path   "build\windows\x64\runner\Release\*" `
            -DestinationPath "hookah-admin-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: hookah-admin-windows.zip
          retention-days: 1


  # ── 4. Создать GitHub Release со всеми артефактами ───────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [setup, build-android, build-windows]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: dist/android

      - uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: dist/windows

      - uses: actions/download-artifact@v4
        with:
          name: release-body
          path: dist

      - name: Переименовать артефакты
        env:
          TAG: ${{ needs.setup.outputs.tag }}
        run: |
          mv dist/android/app-release.apk              "hookah-admin-${TAG}.apk"
          mv dist/android/app-release.aab              "hookah-admin-${TAG}.aab"
          mv dist/windows/hookah-admin-windows.zip     "hookah-admin-windows-${TAG}.zip"
          cp "hookah-admin-${TAG}.apk"                 "hookah-admin-latest.apk"
          cp "hookah-admin-windows-${TAG}.zip"         "hookah-admin-windows-latest.zip"

      - name: Создать GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hookah Admin ${{ needs.setup.outputs.tag }}"
          body_path: dist/release_body.md
          prerelease: false
          files: |
            hookah-admin-${{ needs.setup.outputs.tag }}.apk
            hookah-admin-${{ needs.setup.outputs.tag }}.aab
            hookah-admin-windows-${{ needs.setup.outputs.tag }}.zip
            hookah-admin-latest.apk
            hookah-admin-windows-latest.zip
