name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BUILD=$(git rev-list --count HEAD)
          echo "TAG=$TAG"         >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD=$BUILD"     >> $GITHUB_OUTPUT

      - name: Bump version in pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.VERSION }}+${{ steps.version.outputs.BUILD }}/" pubspec.yaml

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Извлечь changelog для этой версии
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          version = os.environ['VERSION']
          path    = 'CHANGELOG.md'

          body = ''
          if os.path.exists(path):
              content = open(path).read()
              # Ищем блок ## [1.2.3] ... до следующего ## [ или конца файла
              pattern = rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  body = match.group(1).strip()

          if not body:
              body = f'Release {version}'

          # Записываем в файл, чтобы передать в следующий шаг
          with open('release_body.md', 'w') as f:
              f.write(body)

          print('--- Release body ---')
          print(body)
          PYEOF

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 --decode > android/app/release.keystore

      - name: Write key.properties
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.keystore\n' \
            "$STORE_PASS" "$KEY_PASS" "$KEY_ALIAS" \
            > android/key.properties

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=BASE_URL=https://api.hookahorder.ru

      - name: Build AAB (release)
        run: |
          flutter build appbundle --release \
            --dart-define=BASE_URL=https://api.hookahorder.ru

      - name: Rename artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             "hookah-admin-${{ steps.version.outputs.TAG }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
             "hookah-admin-${{ steps.version.outputs.TAG }}.aab"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hookah Admin ${{ steps.version.outputs.TAG }}"
          body_path: release_body.md
          prerelease: false
          files: |
            hookah-admin-${{ steps.version.outputs.TAG }}.apk
            hookah-admin-${{ steps.version.outputs.TAG }}.aab
